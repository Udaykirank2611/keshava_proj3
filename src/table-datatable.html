{% set title = 'Orders' %}
{% set filename = 'table-datatable.html' %}

{% extends 'src/layouts/master.html' %}
{% block content %}
<div class="page-heading">
    <div class="page-title">
        <div class="row">
            <div class="col-12 col-md-6 order-md-1 order-last">
                <h3>Orders</h3>
                <p class="text-subtitle text-muted">Recent orders loaded from <code>data.json</code>.</p>
            </div>
            <div class="col-12 col-md-6 order-md-2 order-first">
                <nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Dashboard</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Orders</li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>
    <section class="section">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">
                    Orders Table
                </h5>
            </div>
            <div class="card-body">
                <div class="alert alert-light-primary mb-3 py-2 px-3 d-none" id="data-load-error"></div>
                <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th class="text-end">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body"></tbody>
                </table>
                </div>
            </div>
        </div>

    </section>
</div>
{% endblock %}
{% block js %}
<script src="assets/static/js/pages/admin-data.js"></script>
{% endblock %}
